# Nginx reverse proxy for the Brainotix Node app.
# Put this at: /etc/nginx/sites-available/brainotix
# Then:  sudo ln -s /etc/nginx/sites-available/brainotix /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# Replace brainotix.com / www.brainotix.com with your real domain.
# Certbot will automatically add the HTTPS (443) server block + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name brainotix.com www.brainotix.com;

    # Cap upload size (the contact form is tiny)
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Pass real client info through to the Node app (so req.ip + rate-limit work)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-friendly (harmless if unused)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 30s;
    }
}
